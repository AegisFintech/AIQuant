data:
  symbols:
    - BTC/USDT
  timeframes:
    - 1m
  start_date: "2024-01-01"  # Focus on recent data for 1m HFT
  data_dir: "data"

features:
  statarb:
    lookback_periods: [60, 120, 240]  # 1h, 2h, 4h in 1m bars
    zscore_threshold: 2.5
    half_life_max: 30
  microstructure:
    ofi_periods: [5, 15, 30]  # Order Flow Imbalance periods
    vpin_periods: [5, 15, 30] # Volume-Synchronized Probability of Informed Trading
  
backtest:
  initial_capital: 100000
  fees: 0.00035  # Hyperliquid taker fee
  slippage: 0.0001
  freq: "1m"

risk:
  kelly_fraction: 0.5  # Half-Kelly for safer sizing
  max_position_size: 0.25
  stop_loss_pct: 0.01  # Tight stops for 1m HFT
  take_profit_pct: 0.03
  max_drawdown_limit: 0.15

execution:
  exchange: "hyperliquid"
  network: "testnet"  # Default to paper trading
